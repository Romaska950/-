<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ИльТьюб — polished edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Вставляю исходные стили ИльТьюб -->
  <style>
    :root{
      --bg:#0f0f10;
      --bg-soft:#141416;
      --panel:#18181b;
      --panel-2:#222228;
      --panel-3:#2a2a33;
      --border:#30303a;
      --text:#f7f7f8;
      --muted:#a1a1aa;
      --accent:#ff3b5c;
      --accent-2:#7c3aed;
      --blue:#3b82f6;
      --green:#16a34a;
      --danger:#dc2626;
      --warning:#f59e0b;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --radius:18px;
      --radius-sm:12px;
      --header-h:60px;
      --sidebar-w:250px;
    }
    /* ... (остальные стили такие же, как в исходном файле) ... */
    body.light{ --bg:#ffffff; --bg-soft:#f7f7fa; --panel:#ffffff; --panel-2:#f2f3f7; --panel-3:#e9ecf3; --border:#dde1ea; --text:#15161a; --muted:#6b7280; --accent:#ff3b5c; --accent-2:#7c3aed; --blue:#2563eb; --green:#16a34a; --danger:#dc2626; --warning:#d97706; --shadow:0 12px 28px rgba(24,39,75,.08); }
    *{box-sizing:border-box;margin:0;padding:0} html,body{height:100%} body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;} img,video{display:block;max-width:100%} button,input,textarea,select{font:inherit}
    .app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr;grid-template-areas:"header header""sidebar main";height:100vh;}
    .header{grid-area:header;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 16px;border-bottom:1px solid var(--border);background:color-mix(in srgb, var(--bg) 86%, transparent);backdrop-filter:blur(12px);position:sticky;top:0;z-index:40;}
    /* ... (вставьте остальной CSS из исходного кода) ... */
  </style>
</head>
<body>
    <div class="app">
        <!-- Весь HTML из предоставленного файла -->
    </div>
    <!-- Скрипты из исходного файла -->
    <script src="CLIENT/functions.js"></script>
    <script>
        // Вся логика из <script> предоставленного файла
    </script>
</body>
</html>
